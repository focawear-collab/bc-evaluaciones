<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackChicken — Evaluación de Desempeño</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f14;--card:#1a1a24;--card2:#2222e;--gold:#D4A843;--gold-dim:#b8922e;--text:#e8e8ec;--muted:#8a8a9a;--green:#4ade80;--yellow:#facc15;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;--border:#2a2a3a}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;gap:16px;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
header img{width:72px;height:72px;object-fit:contain}
header h1{font-size:1.4rem;font-weight:700;color:var(--gold)}
header p{font-size:0.85rem;color:var(--muted)
.phase{display:none}.phase.active{display:block}
.section-title{font-size:1.1rem;font-weight:600;color:var(--gold);margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-title span{font-size:0.75rem;background:var(--gold);color:var(--bg);padding:2px 8px;border-radius:10px;font-weight:700}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:0.8rem;color:var(--muted);font-weight:500}
.form-group input,.form-group select{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:0.9rem;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--gold)}
.comp-block{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.comp-header{font-size:0.95rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.question-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.question-row:last-child{border:none}
.q-text{font-size:0.85rem;color:var(--muted);flex:1;padding-right:16px}
.score-btns{display:flex;gap:4px}
.score-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-weight:600;cursor:pointer;transition:all 0.15s;font-size:0.85rem}
.score-btn:hover{border-color:var(--gold);color:var(--gold)}
.score-btn.selected{background:var(--gold);color:var(--bg);border-color:var(--gold)}
textarea{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:0.85rem;font-family:inherit;resize:vertical;min-height:60px}
textarea:focus{outline:none;border-color:var(--gold)}
.btn{padding:12px 28px;border-radius:10px;font-weight:600;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.2s;font-family:inherit}
.btn-gold{background:var(--gold);color:var(--bg)}.btn-gold:hover{background:var(--gold-dim)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-row{display:flex;gap:12px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.dash-full{grid-column:1/-1}
.score-big{font-size:3.5rem;font-weight:800;line-height:1}
.score-label{font-size:0.8rem;color:var(--muted);margin-top:4px}
.score-band{display:inline-block;padding:4px 12px;border-radius:8px;font-size:0.8rem;font-weight:600;margin-top:8px}
.band-excelente{background:rgba(74,222,128,0.15);color:var(--green)}
.band-bueno{background:rgba(96,165,250,0.15);color:var(--blue)}
.band-mejora{background:rgba(250,204,21,0.15);color:var(--yellow)}
.band-deficiente{background:rgba(248,113,113,0.15);color:var(--red)}
.info-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.info-item{font-size:0.8rem;color:var(--muted)}.info-item strong{color:var(--text)}
.chart-container{position:relative;height:300px}
.chart-sm{height:220px}
.highlight-q{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.highlight-q:last-child{border:none}
.hq-score{min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem}
.hq-text{font-size:0.82rem;flex:1}.hq-comp{font-size:0.7rem;color:var(--muted)}
.comment-box{background:var(--card2);border-radius:8px;padding:12px;margin-top:8px;font-size:0.85rem;color:var(--muted);font-style:italic;white-space:pre-wrap}
.q-detail{font-size:0.8rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(42,42,58,0.5)}
.q-score-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem}
.toast{position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:999;animation:slideIn 0.3s ease;display:none}
.toast.success{background:#166534;color:#bbf7d0;border:1px solid #22c55e}
.toast.error{background:#7f1d1d;color:#fecaca;border:1px solid #ef4444}
.toast.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:998;display:none}
.saving-overlay.show{display:flex}
.saving-box{background:var(--card);padding:32px;border-radius:16px;text-align:center;border:1px solid var(--border)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{body{background:#fff;color:#000}.dash-card{border:1px solid #ddd;break-inside:avoid}.btn-row,.toast,.saving-overlay{display:none!important}}
@media(max-width:700px){.dash-grid,.form-grid{grid-template-columns:1fr}.info-row{flex-direction:column;gap:8px}}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.notion-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:0.75rem;color:var(--muted);margin-top:8px}
.notion-badge svg{width:14px;height:14px}
</style>

<div><h1>Evaluación de Desempeño</h1><p>BlackChicken — Sistema de evaluación por competencias</p></div>

<div id="phase-form" class="phase active">
<div class="section-title"><span>1</span> Identificación</div>
<div class="form-grid">
<div class="form-group"><label>Evaluador(a)</label><input id="f-evaluador" placeholder="Nombre del evaluador"></div>
<div class="form-group"><label>Cargo evaluador</label><input id="f-cargo-ev" placeholder="Jefe de turno, Gerente, etc."></div>

<div><label style="font-size:0.8rem;color:var(--muted)">Fortalezas destacadas</label><textarea id="f-fortalezas" rows="2" placeholder="¿Qué hace bien esta persona?"></textarea></div>
<div><label style="font-size:0.8rem;color:var(--muted)">Áreas de mejora</label><textarea id="f-mejoras" rows="2" placeholder="¿En qué puede mejorar?"></textarea></div>
<div><label style="font-size:0.8rem;color:var(--muted)">Plan de acción / compromisos</label><textarea id="f-plan" rows="2" placeholder="Acciones concretas para los próximos 30 días"></textarea></div>
<div class="form-grid" style="margin-top:8px">
<div class="form-group"><label>📅 Fecha de seguimiento</label><input id="f-seguimiento" type="date"><p style="font-size:0.7rem;color:var(--muted);margin-top:2px">Se creará un recordatorio automático para la jefatura</p></div>
</div>
</div>

<div class="btn-row">

<script>
const COMPETENCIES = [
  {name:'Trabajo en Equipo', icon:'🤝', questions:[
    'Colabora activamente con sus compañeros para alcanzar metas comunes.',
    'Respeta y valora las ideas y aportes de otros miembros del equipo.',
    'Está dispuesto(a) a apoyar y ayudar cuando un compañero lo necesita.'
  ]},
  {name:'Proactividad', icon:'🚀', questions:[
    'Identifica oportunidades de mejora y actúa antes de que se le solicite.',
    'Propone soluciones y toma decisiones dentro de su rol sin esperar instrucciones.',
    'Se adapta rápidamente a cambios sin esperar directrices explícitas.'
  ]},
  {name:'Comunicación Efectiva', icon:'💬', questions:[
    'Expresa ideas y mensajes de forma clara y respetuosa.',
    'Escucha activamente y verifica que comprendió lo que se le comunicó.',
    'Adecua su forma de comunicarse al contexto y a su interlocutor.'
  ]},
  {name:'Tolerancia bajo Presión', icon:'⚡', questions:[
    'Maneja situaciones de alta demanda sin perder el control emocional.',
    'Prioriza tareas y toma decisiones efectivas bajo presión.',
    'Mantiene una actitud positiva y profesional en momentos de estrés.'
  ]},
  {name:'Organización y Planeamiento', icon:'📋', questions:[
    'Establece prioridades y cumple con los tiempos establecidos.',
    'Mantiene su espacio de trabajo limpio, ordenado y funcional.',
    'Administra adecuadamente los recursos asignados.'
  ]},
  {name:'Fit Cultural', icon:'🖤', questions:[
    'Demuestra pasión por lo que hace y busca mejorar continuamente.',
    'Se comporta con humildad, respeto y autenticidad en su entorno laboral.',
    'Refleja compromiso con el cliente y el trabajo en equipo, fomentando un ambiente positivo.'
  ]}
];

const scores = {};
let lastReportData = null;

COMPETENCIES.forEach((c,ci) => c.questions.forEach((_,qi) => scores[ci+'_'+qi] = 0));

function renderForm(){
  const ct = document.getElementById('comp-container');
  ct.innerHTML = '';
  COMPETENCIES.forEach((comp, ci) => {
    let h = '<div class="comp-block"><div class="comp-header">'+comp.icon+' '+comp.name+'</div>';
    comp.questions.forEach((q, qi) => {
      h += '<div class="question-row"><div class="q-text">'+q+'</div><div class="score-btns">';
      for(let s=1;s<=5;s++){
        h += '<button class="score-btn" data-c="'+ci+'" data-q="'+qi+'" data-s="'+s+'" onclick="setScore('+ci+','+qi+','+s+',this)">'+s+'</button>';
      }
      h += '</div></div>';
    });
    h += '</div>';
    ct.innerHTML += h;
  });
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  const seg = new Date(); seg.setDate(seg.getDate()+30);
  document.getElementById('f-seguimiento').value = seg.toISOString().split('T')[0];
}

function setScore(ci, qi, s, el){
  scores[ci+'_'+qi] = s;
  el.parentElement.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function clearForm(){
  Object.keys(scores).forEach(k => scores[k] = 0);
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('input,textarea').forEach(el => {if(el.type!=='date') el.value='';});
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
}

function getColor(v){
  if(v>=4) return 'var(--green)';
  if(v>=3) return 'var(--blue)';
  if(v>=2) return 'var(--yellow)';
  return 'var(--red)';
}
function getHex(v){
  if(v>=4) return '#4ade80';
  if(v>=3) return '#60a5fa';
  if(v>=2) return '#facc15';
  return '#f87171';
}
function getBand(v){
  if(v>=4) return ['Excelente','band-excelente'];
  if(v>=3) return ['Bueno','band-bueno'];
  if(v>=2) return ['Necesita Mejora','band-mejora'];
  return ['Deficiente','band-deficiente'];
}

function generateReport(){
  const missing = Object.values(scores).filter(v => v===0).length;
  if(missing > 0){showToast('Faltan '+missing+' preguntas por evaluar.','error');return;}

  const compScores = COMPETENCIES.map((comp, ci) => {
    const qs = comp.questions.map((q, qi) => ({text:q, score:scores[ci+'_'+qi]}));
    const avg = qs.reduce((a,b) => a+b.score, 0) / qs.length;
    return {name:comp.name, icon:comp.icon, avg:Math.round(avg*100)/100, questions:qs};
  });
  const totalAvg = Math.round(compScores.reduce((a,b) => a+b.avg, 0) / compScores.length * 100)/100;
  const [bandText, bandClass] = getBand(totalAvg);

  const allQ = [];
  compScores.forEach(c => c.questions.forEach(q => allQ.push({...q, comp:c.name})));
  const sorted = [...allQ].sort((a,b) => b.score - a.score);
  const top3 = sorted.slice(0,3);
  const bottom3 = sorted.slice(-3).reverse();

  lastReportData = {
    evaluador: document.getElementById('f-evaluador').value || 'Sin especificar',
    cargoEv: document.getElementById('f-cargo-ev').value || '',
    evaluado: document.getElementById('f-evaluado').value || 'Sin especificar',
    cargoEvd: document.getElementById('f-cargo-evd').value || '',
    local: document.getElementById('f-local').value,
    fecha: document.getElementById('f-fecha').value,
    fortalezas: document.getElementById('f-fortalezas').value,
    mejoras: document.getElementById('f-mejoras').value,
    plan: document.getElementById('f-plan').value,
    seguimiento: document.getElementById('f-seguimiento').value,
    puntajeGeneral: totalAvg,
    banda: bandText,
    trabajoEquipo: compScores[0].avg,
    proactividad: compScores[1].avg,
    comunicacion: compScores[2].avg,
    tolerancia: compScores[3].avg,
    organizacion: compScores[4].avg,
    fitCultural: compScores[5].avg,
    detalle: compScores.map(c => ({name:c.name, avg:c.avg.toFixed(1), questions:c.questions}))
  };

  let h = '<div class="info-row" style="margin-bottom:20px">';
  h += '<div class="info-item"><strong>'+lastReportData.evaluado+'</strong> — '+lastReportData.cargoEvd+'</div>';
  h += '<div class="info-item">Evaluador: <strong>'+lastReportData.evaluador+'</strong> '+(lastReportData.cargoEv?'('+lastReportData.cargoEv+')':'')+'</div>';
  h += '<div class="info-item">'+lastReportData.local+' · '+lastReportData.fecha+'</div>';
  h += '</div><div class="dash-grid">';

  h += '<div class="dash-card" style="text-align:center">';
  h += '<div class="score-label">PUNTAJE GENERAL</div>';
  h += '<div class="score-big" style="color:'+getHex(totalAvg)+'">'+totalAvg.toFixed(1)+'</div>';
  h += '<div><span class="score-band '+bandClass+'">'+bandText+'</span></div>';
  h += '<div style="margin-top:16px;font-size:0.8rem;color:var(--muted)">de 5.0 posibles · 18 preguntas</div>';
  h += '</div>';

  h += '<div class="dash-card"><div style="font-size:0.85rem;font-weight:600;margin-bottom:8px">Perfil de Competencias</div>';
  h += '<div class="chart-container chart-sm"><canvas id="radarChart"></canvas></div></div>';

  h += '<div class="dash-card dash-full"><div style="font-size:0.85rem;font-weight:600;margin-bottom:8px">Puntaje por Competencia</div>';
  h += '<div class="chart-container chart-sm"><canvas id="barChart"></canvas></div></div>';

  h += '<div class="dash-card"><div style="font-size:0.85rem;font-weight:600;margin-bottom:12px">✅ Fortalezas (Top 3)</div>';
  top3.forEach(q => {
    h += '<div class="highlight-q"><div class="hq-score" style="background:'+getHex(q.score)+'22;color:'+getHex(q.score)+'">'+q.score+'</div>';
    h += '<div><div class="hq-text">'+q.text+'</div><div class="hq-comp">'+q.comp+'</div></div></div>';
  });
  h += '</div>';

  h += '<div class="dash-card"><div style="font-size:0.85rem;font-weight:600;margin-bottom:12px">⚠️ Oportunidades (Bottom 3)</div>';
  bottom3.forEach(q => {
    h += '<div class="highlight-q"><div class="hq-score" style="background:'+getHex(q.score)+'22;color:'+getHex(q.score)+'">'+q.score+'</div>';
    h += '<div><div class="hq-text">'+q.text+'</div><div class="hq-comp">'+q.comp+'</div></div></div>';
  });
  h += '</div>';

  h += '<div class="dash-card dash-full"><div style="font-size:0.85rem;font-weight:600;margin-bottom:12px">Detalle por Competencia</div>';
  compScores.forEach(c => {
    h += '<div style="margin-bottom:16px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h += '<span style="font-size:0.85rem;font-weight:600">'+c.icon+' '+c.name+'</span>';
    h += '<span style="font-size:1rem;font-weight:700;color:'+getHex(c.avg)+'">'+c.avg.toFixed(1)+'</span></div>';
    h += '<div style="height:6px;background:var(--card2);border-radius:3px;margin-bottom:8px">';
    h += '<div style="height:100%;width:'+(c.avg/5*100)+'%;background:'+getHex(c.avg)+';border-radius:3px"></div></div>';
    c.questions.forEach(q => {
      h += '<div class="q-detail"><span>'+q.text+'</span>';
      h += '<div class="q-score-dot" style="background:'+getHex(q.score)+'22;color:'+getHex(q.score)+'">'+q.score+'</div></div>';
    });
    h += '</div>';
  });
  h += '</div>';

  if(lastReportData.fortalezas||lastReportData.mejoras||lastReportData.plan){
    h += '<div class="dash-card dash-full"><div style="font-size:0.85rem;font-weight:600;margin-bottom:12px">Comentarios y Plan de Acción</div>';
    if(lastReportData.fortalezas) h += '<div style="margin-bottom:12px"><div style="font-size:0.78rem;color:var(--green);font-weight:600;margin-bottom:4px">FORTALEZAS</div><div class="comment-box">'+lastReportData.fortalezas+'</div></div>';
    if(lastReportData.mejoras) h += '<div style="margin-bottom:12px"><div style="font-size:0.78rem;color:var(--yellow);font-weight:600;margin-bottom:4px">ÁREAS DE MEJORA</div><div class="comment-box">'+lastReportData.mejoras+'</div></div>';
    if(lastReportData.plan) h += '<div><div style="font-size:0.78rem;color:var(--blue);font-weight:600;margin-bottom:4px">PLAN DE ACCIÓN</div><div class="comment-box">'+lastReportData.plan+'</div></div>';
    h += '</div>';
  }

  if(lastReportData.seguimiento){
    h += '<div class="dash-card dash-full" style="border-color:var(--gold);background:rgba(212,168,67,0.05)">';
    h += '<div style="display:flex;align-items:center;gap:10px">';
    h += '<span style="font-size:1.4rem">🔔</span>';
    h += '<div><div style="font-size:0.85rem;font-weight:600;color:var(--gold)">Seguimiento programado</div>';
    h += '<div style="font-size:0.8rem;color:var(--muted)">La jefatura recibirá un recordatorio el <strong style="color:var(--text)">'+lastReportData.seguimiento+'</strong> para revisar avances del plan de acción.</div>';
    h += '</div></div></div>';
  }

  h += '</div>';

  document.getElementById('dash-content').innerHTML = h;
  document.getElementById('phase-form').classList.remove('active');
  document.getElementById('phase-dash').classList.add('active');
  window.scrollTo(0,0);

  // Auto-save: charts + PDF + save
  setTimeout(async () => {
    const labels = compScores.map(c => c.name);
    const vals = compScores.map(c => c.avg);
    const colors = vals.map(v => getHex(v));

    new Chart(document.getElementById('radarChart'), {
      type:'radar',
      data:{labels, datasets:[{data:vals,backgroundColor:'rgba(212,168,67,0.15)',borderColor:'#D4A843',borderWidth:2,pointBackgroundColor:'#D4A843',pointRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:5,ticks:{stepSize:1,color:'#8a8a9a',backdropColor:'transparent'},grid:{color:'#2a2a3a'},pointLabels:{color:'#e8e8ec',font:{size:11}}}},plugins:{legend:{display:false}}}
    });

    new Chart(document.getElementById('barChart'), {
      type:'bar',
      data:{labels, datasets:[{data:vals,backgroundColor:colors.map(c=>c+'33'),borderColor:colors,borderWidth:2,borderRadius:6,barThickness:40}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{min:0,max:5,ticks:{stepSize:1,color:'#8a8a9a'},grid:{color:'#2a2a3a22'}},y:{ticks:{color:'#e8e8ec',font:{size:12}},grid:{display:false}}},plugins:{legend:{display:false}}}
    });
  // Wait for charts to render, generate PDF, then save
  await new Promise(r => setTimeout(r, 900));
  let pdfB64 = null;
  try {
    const el = document.getElementById('dash-content');
    if (el && typeof html2pdf !== 'undefined') {
      const nm = (lastReportData.evaluado||'Evaluado').replace(/\s+/g,'_');
      const buf = await html2pdf().set({
        margin:[8,6,8,6],
        filename:'Eval_'+nm+'.pdf',
        image:{type:'jpeg',quality:0.92},
        html2canvas:{scale:2,useCORS:true,backgroundColor:'#0f0f14',scrollX:0,scrollY:-window.scrollY},
        jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
      }).from(el).outputPdf('arraybuffer');
      const bytes = new Uint8Array(buf);
      let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
      pdfB64 = btoa(bin);
    }
  } catch(pe){ console.warn('PDF gen:',pe.message); }
  saveToNotion(pdfB64);
  }, 100);
}

function newEvaluation(){
  // Full reset for a new evaluation
  Object.keys(scores).forEach(k => scores[k] = 0);
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('input,textarea').forEach(el => {if(el.type!=='date') el.value='';});
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  const seg = new Date(); seg.setDate(seg.getDate()+30);
  document.getElementById('f-seguimiento').value = seg.toISOString().split('T')[0];
  lastReportData = null;
  const psa = document.getElementById('post-save-actions'); if (psa) psa.style.display = 'none';
  document.getElementById('phase-dash').classList.remove('active');
  document.getElementById('phase-form').classList.add('active');
  window.scrollTo(0,0);
}

async function saveToNotion(pdf64){
  if(!lastReportData) return;
  const status = document.getElementById('notion-status');
  const statusText = document.getElementById('notion-status-text');
  status.style.display = 'inline-flex';
  statusText.textContent = '⏳ Guardando en Notion...';

  try{
    const resp = await fetch('/api/save', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...lastReportData,pdfBase64:pdf64||null})
    });
    const data = await resp.json();
    if(data.success){
      statusText.textContent = '✅ Guardado en Notion · 📧 Email enviado';
      status.style.borderColor = '#22c55e';
      const segDate = lastReportData.seguimiento;
      const segMsg = segDate ? ' · Seguimiento: ' + segDate : '';
      showToast('Evaluación guardada en Notion · Email enviado' + segMsg, 'success');
    } else {
      statusText.textContent = '❌ Error: '+(data.error||'No se pudo guardar');
      status.style.borderColor = '#ef4444';
      showToast('Error al guardar: '+(data.error||''),'error');
    }
  }catch(err){
    statusText.textContent = '❌ Error de conexión';
    status.style.borderColor = '#ef4444';
    showToast('Error de conexión: '+err.message,'error');
  }
}

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.className = 'toast '+type+' show';
  t.textContent = msg;
  setTimeout(() => t.classList.remove('show'), 4000);
}

renderForm();
</script>
</body>
</html>
