<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC Reviews · Control de Reseñas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1c1c1c;
  --border: #2a2a2a;
  --border-hover: #3a3a3a;
  --gold: #D4A843;
  --gold-dim: #B8922F;
  --gold-glow: rgba(212, 168, 67, 0.15);
  --text: #e5e5e5;
  --text-dim: #888;
  --text-muted: #555;
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.12);
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.12);
  --orange: #f97316;
  --orange-dim: rgba(249, 115, 22, 0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.12);
  --uber-green: #06C167;
  --justo-purple: #7C3AED;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === HEADER === */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 10, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.logo-mark {
  width: 36px; height: 36px;
  background: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 700; font-size: 18px; color: #0a0a0a;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 600;
  color: var(--gold); letter-spacing: -0.3px;
}

.header h1 span {
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400; font-size: 14px; margin-left: 12px;
}

.header-right { display: flex; align-items: center; gap: 12px; }

.last-update { font-size: 12px; color: var(--text-muted); }

.btn-refresh {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-family: inherit;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}

.btn-refresh:hover { border-color: var(--gold); color: var(--gold); }
.btn-refresh.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* === ALERTS BAR === */
.alerts-bar {
  background: var(--red-dim);
  border-bottom: 1px solid rgba(239, 68, 68, 0.2);
  padding: 12px 32px;
  display: none; align-items: center; gap: 12px;
  font-size: 14px;
}
.alerts-bar.visible { display: flex; }
.alert-icon {
  width: 20px; height: 20px;
  background: var(--red); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
}
.alerts-bar strong { color: var(--red); }

/* === STATS GRID === */
.stats-section { padding: 24px 32px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border-hover); }
.stat-card.urgent { border-color: rgba(239,68,68,0.3); background: linear-gradient(135deg, var(--surface), rgba(239,68,68,0.05)); }
.stat-card.pending { border-color: rgba(249,115,22,0.3); background: linear-gradient(135deg, var(--surface), rgba(249,115,22,0.05)); }

.stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
.stat-card .value { font-size: 32px; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1; }
.stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.stat-card .value.red { color: var(--red); }
.stat-card .value.orange { color: var(--orange); }
.stat-card .value.green { color: var(--green); }
.stat-card .value.gold { color: var(--gold); }
.stat-card .value.blue { color: var(--blue); }

.stat-card .platform-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; padding: 3px 8px; border-radius: 20px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-uber { background: rgba(6,193,103,0.15); color: #06C167; }
.badge-justo { background: rgba(124,58,237,0.15); color: #a78bfa; }

/* === FILTERS === */
.filters-section {
  padding: 0 32px 16px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}

.filter-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 14px; border-radius: 20px;
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--border-hover); color: var(--text); }
.filter-chip.active { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }
.filter-chip.negative-chip.active { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: var(--red); }
.filter-chip.urgent-chip.active { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5); color: var(--red); }
.filter-chip.urgent-chip { border-color: rgba(239,68,68,0.25); color: var(--red); }
.filter-chip.responded-chip.active { background: var(--green-dim); border-color: rgba(34,197,94,0.4); color: var(--green); }

.filter-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

/* === REVIEWS TABLE === */
.reviews-section { padding: 0 32px 32px; }

.reviews-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.reviews-table { width: 100%; border-collapse: collapse; }
.reviews-table thead { background: var(--surface-2); }
.reviews-table th {
  padding: 12px 16px; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); font-weight: 500;
  text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
}
.reviews-table td {
  padding: 14px 16px; font-size: 13px;
  border-bottom: 1px solid var(--border); vertical-align: middle;
}
.reviews-table tbody tr { transition: background 0.15s; }
.reviews-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.reviews-table tbody tr.urgent-row { background: rgba(239,68,68,0.04); }
.reviews-table tbody tr.urgent-row:hover { background: rgba(239,68,68,0.07); }

.cell-customer { display: flex; flex-direction: column; gap: 2px; }
.cell-customer .name { font-weight: 500; color: var(--text); }
.cell-customer .orders { font-size: 11px; color: var(--text-muted); }

.stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
.stars.low { color: var(--red); }
.stars.mid { color: var(--orange); }

.comment-cell { max-width: 260px; line-height: 1.4; color: var(--text-dim); }
.comment-cell.negative { color: var(--red); font-weight: 500; }
.comment-cell.positive { color: var(--green); }

.platform-pill {
  display: inline-flex; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.platform-pill.uber { background: rgba(6,193,103,0.12); color: #06C167; }
.platform-pill.justo { background: rgba(124,58,237,0.12); color: #a78bfa; }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.status-badge.pendiente { background: var(--red-dim); color: var(--red); }
.status-badge.respondida { background: var(--green-dim); color: var(--green); }
.status-badge.sin-comentario { background: rgba(100,100,100,0.12); color: var(--text-muted); }

.days-badge {
  display: inline-flex; padding: 3px 8px;
  border-radius: 6px; font-size: 11px; font-weight: 600;
}
.days-badge.critical { background: var(--red-dim); color: var(--red); }
.days-badge.warning { background: var(--orange-dim); color: var(--orange); }
.days-badge.ok { background: var(--green-dim); color: var(--green); }

.tag-pill {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; margin: 1px 2px;
  background: rgba(255,255,255,0.06); color: var(--text-dim);
}

/* === ACTION BUTTONS === */
.action-cell { display: flex; gap: 6px; align-items: center; white-space: nowrap; }

.btn-respond {
  background: var(--gold-glow);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 5px 12px; border-radius: 6px;
  font-size: 12px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.btn-respond:hover { background: rgba(212,168,67,0.25); border-color: var(--gold); }

.btn-open-platform {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 8px; border-radius: 6px;
  font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
  text-decoration: none; display: inline-flex; align-items: center;
}
.btn-open-platform:hover { border-color: var(--border-hover); color: var(--text); }

.responded-info { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
.responded-info strong { color: var(--green); }
.badge-hoy {
  display: inline-block; padding: 2px 7px; border-radius: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  background: var(--green); color: #0a0a0a;
  vertical-align: middle; margin-right: 4px;
}
.badge-ayer {
  display: inline-block; padding: 2px 7px; border-radius: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3);
  vertical-align: middle; margin-right: 4px;
}
.responded-today { background: rgba(34,197,94,0.04) !important; }
.responded-today:hover { background: rgba(34,197,94,0.08) !important; }
.day-separator-hoy td { background: rgba(34,197,94,0.08) !important; border-left: 3px solid var(--green); }

/* === AI RESPONSE OPTIONS === */
.btn-ai-generate {
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(59,130,246,0.15));
  border: 1px solid rgba(124,58,237,0.35);
  color: #a78bfa;
  padding: 7px 14px; border-radius: 6px;
  font-size: 12px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-ai-generate:hover { background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(59,130,246,0.25)); border-color: rgba(124,58,237,0.6); }
.btn-ai-generate:disabled { opacity: 0.5; cursor: not-allowed; }

.ai-options-wrap { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.ai-option-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
}
.ai-option-card:hover { border-color: var(--gold-dim); background: rgba(212,168,67,0.05); }
.ai-option-card .ai-opt-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); margin-bottom: 5px; font-weight: 600;
}
.ai-option-card .ai-opt-text { font-size: 13px; color: var(--text-dim); line-height: 1.45; }
.ai-option-card .ai-opt-use {
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; color: var(--gold); opacity: 0;
  transition: opacity 0.15s; font-weight: 600;
}
.ai-option-card:hover .ai-opt-use { opacity: 1; }

.ai-tone-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  margin-bottom: 10px; font-weight: 500;
}
.ai-tone-badge.positivo { background: var(--green-dim); color: var(--green); }
.ai-tone-badge.mixto { background: var(--orange-dim); color: var(--orange); }
.ai-tone-badge.negativo { background: var(--red-dim); color: var(--red); }

.ai-loading {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0; color: var(--text-muted); font-size: 13px;
}
.ai-loading .loader { width: 16px; height: 16px; border-width: 1.5px; }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 560px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  animation: slideUp 0.25s ease;
}

@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-header {
  padding: 24px 24px 0;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.modal-header h2 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); }
.modal-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.btn-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 20px; cursor: pointer; padding: 2px; line-height: 1;
  transition: color 0.2s; flex-shrink: 0;
}
.btn-close:hover { color: var(--text); }

.modal-review-card {
  margin: 16px 24px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.modal-review-card .review-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  flex-wrap: wrap;
}
.modal-review-card .review-comment {
  font-size: 13px; color: var(--text-dim); line-height: 1.5;
}
.modal-review-card .review-comment.negative { color: var(--red); }

.modal-body { padding: 0 24px; }

.modal-label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted);
  margin-bottom: 8px; display: block;
}

.response-textarea {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit; font-size: 14px;
  padding: 12px 14px;
  resize: vertical; min-height: 100px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.response-textarea:focus { outline: none; border-color: var(--gold-dim); }
.response-textarea::placeholder { color: var(--text-muted); }

.char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 4px; }

.modal-quick-replies {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.quick-reply-btn {
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-dim); padding: 4px 10px; border-radius: 6px;
  font-size: 11px; font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.quick-reply-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

.modal-footer {
  padding: 16px 24px 24px;
  display: flex; gap: 10px; justify-content: flex-end; align-items: center;
}

.btn-cancel {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); padding: 9px 18px; border-radius: 8px;
  font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }

.btn-save-respond {
  background: var(--gold); border: none;
  color: #0a0a0a; padding: 9px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-save-respond:hover { background: #e6b84a; }
.btn-save-respond:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-save-only {
  background: transparent; border: 1px solid var(--gold-dim);
  color: var(--gold); padding: 9px 18px; border-radius: 8px;
  font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.btn-save-only:hover { background: var(--gold-glow); }
.btn-save-only:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-open-platform-modal {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); padding: 9px 16px; border-radius: 8px;
  font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-open-platform-modal:hover { border-color: var(--border-hover); color: var(--text); }

/* === EMPTY / LOADING === */
.empty-state { text-align: center; padding: 60px 32px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; color: var(--text-dim); margin-bottom: 8px; }

.loading-state {
  display: flex; justify-content: center; align-items: center;
  padding: 80px; gap: 12px; color: var(--text-muted);
}
.loader {
  width: 24px; height: 24px;
  border: 2px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .stats-section { padding: 16px; }
  .filters-section { padding: 0 16px 12px; }
  .reviews-section { padding: 0 16px 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card .value { font-size: 24px; }
  .header h1 span { display: none; }
  .reviews-table-wrap { overflow-x: auto; }
  .reviews-table { min-width: 800px; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* === GESTIÓN JEFE === */
.gestion-section { padding: 0 32px 8px; }
.gestion-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.gestion-header h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 500; }
.gestion-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.gestion-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.gestion-card-header { display: flex; align-items: center; justify-content: space-between; }
.gestion-local-tag { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--gold); }
.gestion-rate-badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.gestion-rate-badge.good { background: var(--green-dim); color: var(--green); }
.gestion-rate-badge.warn { background: var(--orange-dim); color: var(--orange); }
.gestion-rate-badge.bad  { background: var(--red-dim); color: var(--red); }
.gestion-stats-row { display: flex; gap: 20px; }
.gestion-stat { display: flex; flex-direction: column; gap: 2px; }
.gestion-stat .gs-val { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1; }
.gestion-stat .gs-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
.gestion-divider { width: 1px; background: var(--border); align-self: stretch; }
.gestion-footer { border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.gestion-footer-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
.gestion-footer-row strong { color: var(--text); }
.gestion-footer-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.gestion-footer-row .dot.warn { background: var(--orange); }
.gestion-footer-row .dot.bad  { background: var(--red); }
@media (max-width: 768px) { .gestion-section { padding: 0 16px 8px; } .gestion-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- MODAL DE RESPUESTA -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>Responder Reseña</h2>
        <p id="modalSubtitle"></p>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-review-card">
      <div class="review-meta">
        <span id="modalStars"></span>
        <span id="modalPlatform"></span>
        <span style="font-size:12px;color:var(--text-muted)" id="modalDate"></span>
      </div>
      <div class="review-comment" id="modalComment"></div>
    </div>

    <div class="modal-body">
      <label class="modal-label">Tu respuesta</label>
      <textarea class="response-textarea" id="responseText"
        placeholder="Hola [nombre], muchas gracias por tu reseña..."
        oninput="updateCharCount()"></textarea>
      <div class="char-count"><span id="charCount">0</span> / 500 caracteres</div>

      <div style="display:flex;justify-content:flex-end;margin-top:10px;">
        <button class="btn-ai-generate" id="btnAiGenerate" onclick="generateAIOptions()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Generar con IA
        </button>
      </div>

      <div id="aiOptionsWrap"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-open-platform-modal" id="btnOpenPlatform" onclick="openPlatformOnly()">
        Abrir Plataforma
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
      <button class="btn-save-respond" id="btnSaveRespond" onclick="saveResponse()">
        Guardar y Copiar
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-mark">BC</div>
    <h1>Reviews Tracker <span>Control de Reseñas</span></h1>
    <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.25);color:var(--gold-dim);letter-spacing:0.5px;">v2.1</span>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate"></span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadReviews()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Actualizar
    </button>
  </div>
</div>

<!-- ALERTS BAR -->
<div class="alerts-bar" id="alertsBar">
  <div class="alert-icon">!</div>
  <span id="alertText"></span>
</div>

<!-- STATS -->
<div class="stats-section">
  <div class="stats-grid" id="statsGrid"></div>
</div>

<!-- GESTIÓN JEFE -->
<div class="gestion-section" id="gestionSection" style="display:none">
  <div class="gestion-header">
    <h2>📋 Gestión de Respuestas · Jefe de Local</h2>
  </div>
  <div class="gestion-grid" id="gestionGrid"></div>
</div>

<!-- FILTERS -->
<div class="filters-section">
  <button class="filter-chip active" onclick="setFilter('all', this)">Todas</button>
  <button class="filter-chip" onclick="setFilter('pendiente', this)">Pendientes</button>
  <button class="filter-chip urgent-chip" onclick="setFilter('urgentes', this)" id="chip-urgentes">🔥 Urgentes</button>
  <button class="filter-chip negative-chip" onclick="setFilter('negativas', this)" id="chip-negativas">⚠ Negativas</button>
  <button class="filter-chip responded-chip" onclick="setFilter('respondida', this)" id="chip-respondidas">✓ Respondidas</button>
  <div class="filter-divider"></div>
  <button class="filter-chip" onclick="setFilter('uber', this)">Uber Eats</button>
  <button class="filter-chip" onclick="setFilter('justo', this)">Justo</button>
  <div class="filter-divider"></div>
  <button class="filter-chip" onclick="setFilter('bc1', this)">BC1</button>
  <button class="filter-chip" onclick="setFilter('bc2', this)">BC2</button>
</div>

<!-- REVIEWS TABLE -->
<div class="reviews-section">
  <div id="reviewsContent">
    <div class="loading-state">
      <div class="loader"></div>
      <span>Cargando reseñas...</span>
    </div>
  </div>
</div>

<script>
let allReviews = [];
let currentFilter = 'all';
let summaryData = {};
let activeReview = null;

const UBER_STORE = 'c209c820-d15b-4462-a310-c7af75bf5b11';

const QUICK_REPLIES = {
  positiva: 'Hola {nombre}, ¡muchas gracias por tu reseña y por elegirnos! Nos alegra mucho que hayas disfrutado tu pedido. Esperamos verte pronto en BlackChicken 🤙',
  negativa: 'Hola {nombre}, lamentamos mucho que tu experiencia no haya sido la que esperabas. Tu comentario es muy valioso para nosotros y lo tomaremos en cuenta para mejorar. Te invitamos a darnos otra oportunidad — nos gustaría sorprenderte. Gracias por tu honestidad.',
  frio: 'Hola {nombre}, pedimos disculpas porque tu pedido llegó frío. Eso no refleja nuestros estándares. Estamos trabajando con el equipo de despacho para mejorar los tiempos. Gracias por avisarnos — sin tu feedback no podemos mejorar. 🙏'
};

async function loadReviews() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  try {
    const res = await fetch('/api/reviews?limit=100');
    const data = await res.json();
    if (data.error) throw new Error(data.details || data.error);

    allReviews = data.reviews || [];
    summaryData = data.summary || {};

    renderStats(summaryData);
    renderGestion();
    renderAlerts(summaryData);
    renderReviews(filterReviews(allReviews, currentFilter));

    const lastDate = summaryData.lastReviewDate;
    if (lastDate) {
      const [y, m, d] = lastDate.split('-');
      const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      document.getElementById('lastUpdate').textContent =
        'Última reseña: ' + parseInt(d) + '-' + months[parseInt(m)-1];
    }
  } catch (err) {
    console.error(err);
    document.getElementById('reviewsContent').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>Error al cargar reseñas</h3>
        <p>${err.message}</p>
      </div>`;
  } finally {
    btn.classList.remove('loading');
  }
}

function renderStats(s) {
  const avgResponseDays = calcAvgResponseDays();
  const negativasCount = allReviews.filter(r => r.estrellas != null && r.estrellas <= 2).length;
  const respondidasCount = allReviews.filter(r => r.estado === 'Respondida').length;
  // Pendientes = solo negativas sin responder (< 3★) — foco operacional
  const pendientesCount = allReviews.filter(r => r.estado === 'Pendiente' && r.estrellas != null && r.estrellas < 3).length;
  const urgentesCount = allReviews.filter(r => r.estado === 'Pendiente' && r.estrellas != null && r.estrellas < 3 && r.diasRestantes != null && r.diasRestantes <= 3).length;
  const chipNeg = document.getElementById('chip-negativas');
  const chipResp = document.getElementById('chip-respondidas');
  const chipUrg = document.getElementById('chip-urgentes');
  if (chipNeg) chipNeg.textContent = `⚠ Negativas${negativasCount ? ' (' + negativasCount + ')' : ''}`;
  if (chipResp) chipResp.textContent = `✓ Respondidas${respondidasCount ? ' (' + respondidasCount + ')' : ''}`;
  if (chipUrg) chipUrg.textContent = `🔥 Urgentes${urgentesCount ? ' (' + urgentesCount + ')' : ''}`;
  const chipPend = document.querySelector('.filter-chip[onclick*="pendiente"]');
  if (chipPend) chipPend.textContent = `Pendientes${pendientesCount ? ' (' + pendientesCount + ')' : ''}`;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="label">Total Reseñas</div>
      <div class="value gold">${s.total || 0}</div>
      <div class="sub">Ambas plataformas</div>
    </div>
    <div class="stat-card urgent">
      <div class="label">🔥 Urgentes (≤3 días)</div>
      <div class="value red">${urgentesCount}</div>
      <div class="sub">Negativas sin respuesta</div>
    </div>
    <div class="stat-card pending">
      <div class="label">Pendientes críticas</div>
      <div class="value orange">${pendientesCount}</div>
      <div class="sub">Negativas &lt;3★ sin responder</div>
    </div>
    <div class="stat-card">
      <div class="label">Respondidas</div>
      <div class="value green">${s.respondidas || 0}</div>
      <div class="sub">${s.total ? Math.round(s.respondidas/s.total*100) : 0}% del total</div>
    </div>
    <div class="stat-card">
      <div class="label">Promedio Estrellas</div>
      <div class="value gold">${s.avgStars || '—'}</div>
      <div class="sub">General</div>
    </div>
    ${avgResponseDays !== null ? `
    <div class="stat-card">
      <div class="label">T° Respuesta Prom.</div>
      <div class="value blue">${avgResponseDays}d</div>
      <div class="sub">Desde reseña hasta respuesta</div>
    </div>` : ''}
    <div class="stat-card">
      <span class="platform-badge badge-uber">Uber</span>
      <div class="label">Uber Eats</div>
      <div class="value">${s.uber?.total || 0}</div>
      <div class="sub">${s.uber?.pendientes || 0} pendientes · ★ ${s.uber?.avg || '—'}</div>
    </div>
    <div class="stat-card">
      <span class="platform-badge badge-justo">Justo</span>
      <div class="label">Justo Hub</div>
      <div class="value">${s.justo?.total || 0}</div>
      <div class="sub">${s.justo?.pendientes || 0} pendientes · ★ ${s.justo?.avg || '—'}</div>
    </div>
  `;
}

function calcAvgResponseDays() {
  const responded = allReviews.filter(r => r.estado === 'Respondida' && r.fechaResena && r.fechaRespuesta);
  if (!responded.length) return null;
  const total = responded.reduce((sum, r) => {
    const diff = (new Date(r.fechaRespuesta) - new Date(r.fechaResena)) / 86400000;
    return sum + Math.max(0, diff);
  }, 0);
  return Math.round(total / responded.length);
}

function renderGestion() {
  const locales = ['BC1', 'BC2'];
  const today = new Date();
  const sevenDaysAgo = new Date(today); sevenDaysAgo.setDate(today.getDate() - 7);

  const cards = locales.map(local => {
    const localReviews = allReviews.filter(r => r.local === local);
    if (!localReviews.length) return '';

    const conComentario = localReviews.filter(r => r.comentario && r.comentario.trim());
    const respondidas = localReviews.filter(r => r.estado === 'Respondida');
    const pendientes = localReviews.filter(r => r.estado === 'Pendiente');

    // Respondidas esta semana
    const respSemana = respondidas.filter(r => {
      if (!r.fechaRespuesta) return false;
      return new Date(r.fechaRespuesta) >= sevenDaysAgo;
    });

    // Tasa sobre reseñas con comentario (las que realmente necesitan respuesta)
    const base = conComentario.length || localReviews.length;
    const tasa = base > 0 ? Math.round(respondidas.length / base * 100) : 0;
    const rateCls = tasa >= 70 ? 'good' : tasa >= 40 ? 'warn' : 'bad';

    // Última respuesta
    const ultimaResp = respondidas
      .filter(r => r.fechaRespuesta)
      .sort((a, b) => b.fechaRespuesta.localeCompare(a.fechaRespuesta))[0];

    // Respondedores únicos
    const respondedores = [...new Set(respondidas.filter(r => r.respondidaPor).map(r => r.respondidaPor))];

    // Más antigua pendiente
    const masAntigua = pendientes
      .filter(r => r.fechaResena)
      .sort((a, b) => a.fechaResena.localeCompare(b.fechaResena))[0];

    const pendDotCls = pendientes.length === 0 ? '' :
                       pendientes.some(r => r.diasRestantes != null && r.diasRestantes <= 3) ? 'bad' :
                       pendientes.length > 3 ? 'warn' : '';

    return `
      <div class="gestion-card">
        <div class="gestion-card-header">
          <span class="gestion-local-tag">${local}</span>
          <span class="gestion-rate-badge ${rateCls}">${tasa}% respondidas</span>
        </div>
        <div class="gestion-stats-row">
          <div class="gestion-stat">
            <span class="gs-val" style="color:var(--green)">${respondidas.length}</span>
            <span class="gs-lbl">Respondidas</span>
          </div>
          <div class="gestion-divider"></div>
          <div class="gestion-stat">
            <span class="gs-val" style="color:var(--orange)">${pendientes.length}</span>
            <span class="gs-lbl">Pendientes</span>
          </div>
          <div class="gestion-divider"></div>
          <div class="gestion-stat">
            <span class="gs-val" style="color:var(--blue)">${respSemana.length}</span>
            <span class="gs-lbl">Últ. 7 días</span>
          </div>
          <div class="gestion-divider"></div>
          <div class="gestion-stat">
            <span class="gs-val" style="color:var(--text)">${localReviews.length}</span>
            <span class="gs-lbl">Total</span>
          </div>
        </div>
        <div class="gestion-footer">
          ${ultimaResp ? `<div class="gestion-footer-row"><span class="dot"></span> Última respuesta: <strong>${fmtDate(ultimaResp.fechaRespuesta)}${ultimaResp.respondidaPor ? ' · ' + ultimaResp.respondidaPor : ''}</strong></div>` : '<div class="gestion-footer-row"><span class="dot bad"></span> Sin respuestas registradas</div>'}
          ${pendientes.length > 0 ? `<div class="gestion-footer-row"><span class="dot ${pendDotCls}"></span> ${pendientes.length} pendiente${pendientes.length > 1 ? 's' : ''}${masAntigua ? ' · más antigua: ' + fmtDate(masAntigua.fechaResena) : ''}</div>` : '<div class="gestion-footer-row"><span class="dot"></span> <strong style="color:var(--green)">Sin pendientes ✓</strong></div>'}
          ${respondedores.length ? `<div class="gestion-footer-row"><span style="color:var(--text-muted)">👤</span> Respondido por: <strong>${respondedores.join(', ')}</strong></div>` : ''}
        </div>
      </div>`;
  }).join('');

  const section = document.getElementById('gestionSection');
  const grid = document.getElementById('gestionGrid');
  if (cards.replace(/\s/g,'')) {
    grid.innerHTML = cards;
    section.style.display = 'block';
  }
}

function renderAlerts(s) {
  const bar = document.getElementById('alertsBar');
  const text = document.getElementById('alertText');
  const urgCount = allReviews.filter(r => r.estado === 'Pendiente' && r.estrellas != null && r.estrellas < 3 && r.diasRestantes != null && r.diasRestantes <= 3).length;
  const pendCount = allReviews.filter(r => r.estado === 'Pendiente' && r.estrellas != null && r.estrellas < 3).length;
  if (urgCount > 0) {
    bar.style.background = 'var(--red-dim)';
    bar.style.borderColor = 'rgba(239,68,68,0.2)';
    bar.classList.add('visible');
    text.innerHTML = `<strong>${urgCount} reseña negativa${urgCount > 1 ? 's' : ''} urgente${urgCount > 1 ? 's' : ''}</strong> — quedan ≤3 días para responder. ¡Actúa ahora!`;
  } else if (pendCount > 0) {
    bar.style.background = 'var(--orange-dim)';
    bar.style.borderColor = 'rgba(249,115,22,0.2)';
    bar.classList.add('visible');
    text.innerHTML = `<strong style="color:var(--orange)">${pendCount} reseña negativa${pendCount > 1 ? 's' : ''} sin responder</strong> — &lt;3★ esperando respuesta`;
  } else {
    bar.classList.remove('visible');
  }
}

function filterReviews(reviews, filter) {
  switch(filter) {
    case 'pendiente':  return reviews.filter(r => r.estado === 'Pendiente' && r.estrellas != null && r.estrellas < 3);
    case 'urgentes':   return reviews.filter(r => r.estado === 'Pendiente' && r.estrellas != null && r.estrellas < 3 && r.diasRestantes != null && r.diasRestantes <= 3);
    case 'respondida': return reviews
      .filter(r => r.estado === 'Respondida')
      .sort((a, b) => (b.fechaRespuesta || '').localeCompare(a.fechaRespuesta || ''));
    case 'negativas':  return reviews.filter(r => r.estrellas != null && r.estrellas <= 2);
    case 'uber':       return reviews.filter(r => r.plataforma === 'Uber Eats');
    case 'justo':      return reviews.filter(r => r.plataforma === 'Justo');
    case 'bc1':        return reviews.filter(r => r.local === 'BC1');
    case 'bc2':        return reviews.filter(r => r.local === 'BC2');
    default:           return reviews;
  }
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderReviews(filterReviews(allReviews, filter));
}

function starsHTML(n) {
  if (n == null) return '<span class="stars">—</span>';
  const cls = n <= 2 ? 'low' : n <= 3 ? 'mid' : '';
  return `<span class="stars ${cls}">${'★'.repeat(Math.round(n))}${'☆'.repeat(5-Math.round(n))}</span>`;
}

function daysHTML(d) {
  if (d == null) return '—';
  const cls = d <= 3 ? 'critical' : d <= 7 ? 'warning' : 'ok';
  return `<span class="days-badge ${cls}">${d}d</span>`;
}

function platformURL(r) {
  if (r.plataforma === 'Uber Eats') {
    const d = r.fechaResena || '';
    let url = `https://merchants.ubereats.com/manager/home/${UBER_STORE}/feedback/reviews?start=${d}&end=${d}&reply=all`;
    if (r.estrellas != null) url += `&rating=${Math.round(r.estrellas)}`;
    return url;
  }
  return 'https://hub.getjusto.com';
}

function renderReviews(reviews) {
  const container = document.getElementById('reviewsContent');
  if (!reviews.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <h3>Sin reseñas</h3>
        <p>No hay reseñas que coincidan con el filtro.</p>
      </div>`;
    return;
  }

  // Separadores de día para vista "Respondidas"
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  function dayLabel(iso) {
    if (!iso) return null;
    if (iso === today) return 'Hoy';
    if (iso === yesterday) return 'Ayer';
    return fmtDate(iso);
  }
  let lastRespDate = null;

  const rows = reviews.map(r => {
    const isUrgent = r.estado === 'Pendiente' && r.diasRestantes != null && r.diasRestantes <= 3;
    const statusCls = r.estado === 'Pendiente' ? 'pendiente' : r.estado === 'Respondida' ? 'respondida' : 'sin-comentario';
    const platformCls = r.plataforma === 'Uber Eats' ? 'uber' : 'justo';
    const commentCls = r.estrellas != null && r.estrellas <= 2 ? 'negative' :
                       r.estrellas != null && r.estrellas >= 4 ? 'positive' : '';
    const tagsHTML = r.tags.length ? r.tags.map(t => `<span class="tag-pill">${t}</span>`).join('') : '';

    const platformUrlStr = platformURL(r);

    const respHoy = r.estado === 'Respondida' && r.fechaRespuesta === today;
    const respAyer = r.estado === 'Respondida' && r.fechaRespuesta === yesterday;
    const actionHTML = r.estado === 'Respondida'
      ? `<div class="responded-info">
           ${respHoy ? '<span class="badge-hoy">HOY</span>' : respAyer ? '<span class="badge-ayer">AYER</span>' : ''}
           <strong>✓ Respondida</strong><br>
           ${r.respondidaPor ? 'Por ' + r.respondidaPor : ''}
           ${r.fechaRespuesta ? ' · ' + fmtDate(r.fechaRespuesta) : ''}
         </div>`
      : `<div class="action-cell">
           <button class="btn-respond" onclick="openModal('${r.id}')">
             <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
             Respuesta Recomendada
           </button>
           <a class="btn-open-platform" href="${platformUrlStr}" target="_blank" title="Abrir en ${r.plataforma}">
             <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
           </a>
         </div>`;

    let separator = '';
    if (currentFilter === 'respondida' && r.fechaRespuesta) {
      const label = dayLabel(r.fechaRespuesta);
      if (label !== lastRespDate) {
        lastRespDate = label;
        const isHoyLabel = label === 'Hoy';
        separator = `<tr class="${isHoyLabel ? 'day-separator-hoy' : ''}"><td colspan="10" style="padding:10px 16px 4px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);border-bottom:none;background:${isHoyLabel ? 'rgba(34,197,94,0.08)' : 'var(--surface-2)'}">
          <span style="color:${isHoyLabel ? 'var(--green)' : 'var(--gold)'};font-weight:700">${label}</span>
          ${isHoyLabel ? '<span style="font-size:10px;color:var(--green);margin-left:6px;opacity:0.7">nuevas ↑</span>' : ''}
        </td></tr>`;
      }
    }

    return separator + `
      <tr class="${isUrgent ? 'urgent-row' : respHoy ? 'responded-today' : ''}">
        <td>
          <div class="cell-customer">
            <span class="name">${r.nombre || 'Anónimo'}</span>
            <span class="orders">${r.numPedidos ? r.numPedidos + ' pedidos' : ''}</span>
          </div>
        </td>
        <td><span class="platform-pill ${platformCls}">${r.plataforma}</span></td>
        <td>${r.local || '—'}</td>
        <td>${starsHTML(r.estrellas)}</td>
        <td>
          <div class="comment-cell ${commentCls}">
            ${r.comentario || '<span style="color:var(--text-muted)">Sin comentario</span>'}
            ${tagsHTML ? '<div style="margin-top:4px">' + tagsHTML + '</div>' : ''}
          </div>
        </td>
        <td style="white-space:nowrap">${r.fechaResena ? fmtDate(r.fechaResena) : '—'}</td>
        <td><span class="status-badge ${statusCls}">${r.estado}</span></td>
        <td>${daysHTML(r.diasRestantes)}</td>
        <td style="color:var(--text-dim);white-space:nowrap">${r.montoPedido ? '$' + r.montoPedido.toLocaleString('es-CL') : '—'}</td>
        <td>${actionHTML}</td>
      </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="reviews-table-wrap">
      <table class="reviews-table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Plataforma</th>
            <th>Local</th>
            <th>Rating</th>
            <th>Comentario</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Plazo</th>
            <th>Monto</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return parseInt(d) + '-' + months[parseInt(m)-1];
}

// === MODAL ===
function openModal(reviewId) {
  const r = allReviews.find(x => x.id === reviewId);
  if (!r) return;
  activeReview = r;

  document.getElementById('modalSubtitle').textContent =
    r.nombre + ' · ' + r.plataforma + ' · ' + (r.fechaResena ? fmtDate(r.fechaResena) : '');
  document.getElementById('modalStars').innerHTML = starsHTML(r.estrellas);
  document.getElementById('modalPlatform').innerHTML =
    `<span class="platform-pill ${r.plataforma === 'Uber Eats' ? 'uber' : 'justo'}">${r.plataforma}</span>`;
  document.getElementById('modalDate').textContent = r.fechaResena ? fmtDate(r.fechaResena) : '';

  const commentEl = document.getElementById('modalComment');
  commentEl.textContent = r.comentario || 'Sin comentario';
  commentEl.className = 'review-comment' + (r.estrellas != null && r.estrellas <= 2 ? ' negative' : '');

  document.getElementById('responseText').value = '';
  updateCharCount();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('aiOptionsWrap').innerHTML = '';
  window.__aiOptions = [];
  activeReview = null;
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function updateCharCount() {
  const len = document.getElementById('responseText').value.length;
  document.getElementById('charCount').textContent = len;
}

function setQuickReply(type) {
  const tpl = QUICK_REPLIES[type] || '';
  const name = activeReview?.nombre?.split(' ')[0] || 'cliente';
  document.getElementById('responseText').value = tpl.replace('{nombre}', name);
  updateCharCount();
  document.getElementById('responseText').focus();
}

async function generateAIOptions() {
  if (!activeReview) return;
  const btn = document.getElementById('btnAiGenerate');
  const wrap = document.getElementById('aiOptionsWrap');

  btn.disabled = true;
  wrap.innerHTML = `<div class="ai-loading"><div class="loader"></div> Generando opciones con IA...</div>`;

  try {
    const res = await fetch('/api/generate-response', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        comentario: activeReview.comentario,
        estrellas: activeReview.estrellas,
        nombre: activeReview.nombre,
        plataforma: activeReview.plataforma,
        local: activeReview.local
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.details || data.error);

    const tonoCls = data.tono_detectado || 'mixto';
    const labels = ['Cálida', 'Profesional', 'Breve'];
    const options = [data.opcion1, data.opcion2, data.opcion3].filter(Boolean);

    wrap.innerHTML = `
      <div class="ai-options-wrap">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span class="ai-tone-badge ${tonoCls}">
            ${tonoCls === 'positivo' ? '🟢' : tonoCls === 'negativo' ? '🔴' : '🟡'} ${tonoCls}
          </span>
          ${data.tema_principal ? `<span style="font-size:11px;color:var(--text-muted)">${data.tema_principal}</span>` : ''}
        </div>
        ${options.map((txt, i) => `
          <div class="ai-option-card" onclick="useAIOption(${i})">
            <div class="ai-opt-label">${labels[i] || 'Opción ' + (i+1)}</div>
            <div class="ai-opt-text" id="ai-opt-${i}">${txt}</div>
            <span class="ai-opt-use">Usar esta →</span>
          </div>`).join('')}
      </div>`;

    // Store options for click handler
    window.__aiOptions = options;

  } catch (err) {
    wrap.innerHTML = `<div style="font-size:12px;color:var(--red);padding:8px 0">Error: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

function useAIOption(idx) {
  const options = window.__aiOptions || [];
  if (options[idx] != null) {
    document.getElementById('responseText').value = options[idx];
    updateCharCount();
    document.getElementById('responseText').focus();
    // Highlight selected
    document.querySelectorAll('.ai-option-card').forEach((c, i) => {
      c.style.borderColor = i === idx ? 'var(--gold)' : '';
      c.style.background = i === idx ? 'rgba(212,168,67,0.08)' : '';
    });
  }
}

function openPlatformOnly() {
  if (!activeReview) return;
  window.open(platformURL(activeReview), '_blank');
}

async function saveResponse() {
  if (!activeReview) return;

  const respuesta = document.getElementById('responseText').value.trim();
  const btnMain = document.getElementById('btnSaveRespond');

  btnMain.disabled = true;
  btnMain.textContent = 'Guardando...';

  try {
    const res = await fetch('/api/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pageId: activeReview.id,
        respuesta,
        respondidaPor: 'Jonathan'
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.details || data.error);

    // Copiar al portapapeles
    try { await navigator.clipboard.writeText(respuesta); } catch(e) {}

    // Update local state
    const idx = allReviews.findIndex(x => x.id === activeReview.id);
    if (idx !== -1) {
      allReviews[idx].estado = 'Respondida';
      allReviews[idx].razon = respuesta;
      allReviews[idx].respondidaPor = 'Jonathan';
      allReviews[idx].fechaRespuesta = new Date().toISOString().split('T')[0];
    }

    summaryData.pendientes = Math.max(0, (summaryData.pendientes || 1) - 1);
    summaryData.respondidas = (summaryData.respondidas || 0) + 1;

    // Feedback visual antes de cerrar
    btnMain.innerHTML = '✓ Guardado y Copiado';
    btnMain.style.background = 'var(--green)';
    await new Promise(r => setTimeout(r, 800));

    closeModal();
    renderStats(summaryData);
    renderGestion();
    renderAlerts(summaryData);
    renderReviews(filterReviews(allReviews, currentFilter));

  } catch (err) {
    alert('Error al guardar: ' + err.message);
  } finally {
    btnMain.disabled = false;
    btnMain.style.background = '';
    btnMain.innerHTML = 'Guardar y Copiar <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
  }
}

// Escape key closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadReviews();
</script>
</body>
